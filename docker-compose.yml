name: dano

services:
  app:
    image: ${DANO_IMAGE:-dano-app:local}
    restart: unless-stopped
    cap_add:
      - ALL
    security_opt:
      - seccomp=unconfined
    environment:
      DANO_HOST: 0.0.0.0
      DANO_PORT: 8080
      DANO_RUNTIME_DIR: /opt/dano/runtime-data
      DANO_UPLOAD_DIR: /opt/dano/runtime-data/.dano/uploads
      DANO_UPLOAD_MAX_TOTAL_BYTES: ${DANO_UPLOAD_MAX_TOTAL_BYTES:-10737418240}
      DANO_UPLOAD_DRAFT_TTL_MS: ${DANO_UPLOAD_DRAFT_TTL_MS:-7200000}
      DANO_UPLOAD_REFERENCED_TTL_MS: ${DANO_UPLOAD_REFERENCED_TTL_MS:-86400000}
      DANO_UPLOAD_ORPHANED_TTL_MS: ${DANO_UPLOAD_ORPHANED_TTL_MS:-300000}
      DANO_UPLOAD_CLEANUP_INTERVAL_MS: ${DANO_UPLOAD_CLEANUP_INTERVAL_MS:-3600000}
      DANO_LLM_TIMEOUT_MS: ${DANO_LLM_TIMEOUT_MS:-30000}
      # 接入同机 skillmanner 网关(dano agent 的 A-OA skill 经此执行真实动作)。
      # 实际值由部署方在 .env 注入;切勿把 DANO_TENANT_KEY 提交进仓库。
      DANO_URL: ${DANO_URL:-}
      DANO_TENANT_KEY: ${DANO_TENANT_KEY:-}
      AGENT_WORLD_API_KEY: ${AGENT_WORLD_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENCODE_API_KEY: ${OPENCODE_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      XIAOMI_API_KEY: ${XIAOMI_API_KEY:-}
      XIAOMI_TOKEN_PLAN_CN_API_KEY: ${XIAOMI_TOKEN_PLAN_CN_API_KEY:-}
      OPENAI_API_KEY_FILE: ${OPENAI_API_KEY_FILE:-}
      ANTHROPIC_API_KEY_FILE: ${ANTHROPIC_API_KEY_FILE:-}
      DEEPSEEK_API_KEY_FILE: ${DEEPSEEK_API_KEY_FILE:-}
    expose:
      - "8080"
    volumes:
      - ${DANO_RUNTIME_DIR:-/opt/dano/runtime-data}:/opt/dano/runtime-data
      - ${DANO_SECRETS_DIR:-/opt/dano/deploy/.secrets}:/run/secrets:ro
    networks:
      - default
      - skillmanner
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${DANO_NGINX_PORT:-80}:80"
    volumes:
      - ${DANO_NGINX_CONF:-/opt/dano/deploy/nginx/default.conf}:/etc/nginx/conf.d/default.conf:ro
    networks:
      - default
      - skillmanner

networks:
  default:
  # skillmanner 是同机业务动作网关的 Compose 网络;A-OA skill 通过它执行真实业务动作。
  # 该网络由 skillmanner 的 compose 创建。独立部署 Dano 且不接业务网关时,
  # 删掉本段以及 app/nginx 下的 skillmanner networks 引用即可。
  skillmanner:
    external: true
    name: skillmanner_default
