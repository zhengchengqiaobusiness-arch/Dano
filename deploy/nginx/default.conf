# WebSocket 升级头(/admin 下网页录制等长连接需要)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream dano_app {
  server app:8080;
}

server {
  listen 80;
  server_name _;
  client_max_body_size 50m;

  # 接入同机 skillmanner 管理后台(子路径 /admin)。用变量 + resolver:
  # skillmanner 不在场时只返回 502,不会阻塞 nginx/dano 启动。
  location /admin {
    resolver 127.0.0.11 valid=10s;
    set $skillmanner_web http://skillmanner-web;
    proxy_pass $skillmanner_web;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
  }

  location ~ ^/api/clients/[^/]+/events$ {
    proxy_pass http://dano_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    add_header X-Accel-Buffering no;
  }

  location /api/ {
    proxy_pass http://dano_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://dano_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
