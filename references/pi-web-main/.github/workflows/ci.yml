name: CI
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Type-check
        run: pnpm run check:type
      - name: Run tests
        run: pnpm test
      - name: Run Lints
        run: pnpm run lint
      - name: Run Svelet check
        run: pnpm run check:web
      - name: Build server bundle
        run: pnpm run build:server
      - name: Build published Svelte web bundle
        run: pnpm run build:web
      - name: Pack npm tarball
        run: pnpm pack --pack-destination .artifacts
      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: .artifacts/*.tgz
