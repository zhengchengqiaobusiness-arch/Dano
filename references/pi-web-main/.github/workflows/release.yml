name: Release
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
permissions:
  contents: write
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          if [ "v${PACKAGE_VERSION}" != "${TAG_NAME}" ]; then
            echo "Tag ${TAG_NAME} does not match package version v${PACKAGE_VERSION}"
            exit 1
          fi
      - name: Run Lints
        run: pnpm run lint
      - name: Run Svelet check
        run: pnpm run check:web
      - name: Run tests
        run: pnpm test
      - name: Build server bundle
        run: pnpm run build:server
      - name: Build published Svelte web bundle
        run: pnpm run build:web
      - name: Pack npm tarball
        run: pnpm pack --pack-destination .artifacts
      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: .artifacts/*.tgz
      - name: Generate changelog
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: Create GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - publish
    runs-on: ubuntu-latest
    steps:
      - name: Download npm package artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: .artifacts/npm-package
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .artifacts/npm-package/*.tgz
          generate_release_notes: true
