openapi: 3.0.3
info: { title: RuoYi-Flowable 请假流程(仅请假,真实接入用), version: 1.0.0 }
servers:
  - url: https://u858758-netf-d87bf18d.westd.seetacloud.com:8443/prod-api
components:
  schemas:
    AjaxResult:
      type: object
      properties: { code: { type: integer }, msg: { type: string } }
    FlowTaskVo:
      type: object
      properties:
        taskId: { type: string }
        defId: { type: string }
        templateId: { type: string }
        comment: { type: string }
        variables: { type: object }
    CommonFlowSubmit:
      type: object
      required: [operateType, flowTask, template]
      properties:
        operateType: { type: string }
        flowTask: { $ref: '#/components/schemas/FlowTaskVo' }
        template: { type: object, properties: { id: { type: string } } }
paths:
  # 基础设施(会被智能抽离过滤,不生成 Skill;此处仅供登录上下文)
  /captchaImage: { get: { operationId: get_captcha, summary: 获取验证码 } }
  /getInfo: { get: { operationId: get_user_info, summary: 当前用户信息 } }
  # 请假流程仅需的业务端点(写入严格限定在 发起 + 提交)
  /template/template/newStart:
    get: { operationId: list_startable_templates, summary: 可发起请假模板 }
  /workflow/handle/startFlow:
    post:
      operationId: start_leave_flow
      summary: 发起请假流程
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [templateId]
              properties:
                templateId: { type: string }
  /biz/flow/submit:
    post:
      operationId: submit_flow_task
      summary: 提交请假任务
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CommonFlowSubmit' }
  /workflow/todo/list:
    get: { operationId: list_todo, summary: 我的待办(请假审批) }
